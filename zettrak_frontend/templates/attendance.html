{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZetTrak - Attendance</title>
  <link rel="stylesheet" href="{% static 'app.css' %}" />
</head>
<body>

  {% with active_page='attendance' %}{% include '_sidebar.html' %}{% endwith %}

  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <h2>&#128203; Attendance</h2>
        <p>Track employee check-in and check-out</p>
      </div>
      <span class="topbar-badge">&#9881; Admin</span>
    </header>

    <main class="content">

      <div class="form-panel">
        <div class="section-title"><span>&#128203;</span> Mark Attendance</div>
        <input type="number" id="employeeId" class="standalone-input" placeholder="Enter Employee ID" />
        <div class="btn-row">
          <button class="btn btn-primary" onclick="checkIn()">&#9989; Check In</button>
          <button class="btn btn-secondary" onclick="checkOut()">&#128683; Check Out</button>
          <button class="btn btn-secondary" onclick="loadAttendanceHistory()">&#8635; Refresh Records</button>
        </div>
        <p id="attendanceMsg" class="message"></p>
      </div>

      <div class="table-panel">
        <div class="table-header"><h4>&#128203; All Attendance Records</h4></div>
        <table>
          <thead>
            <tr><th>ID</th><th>Employee</th><th>Date</th><th>Check In</th><th>Check Out</th><th>Status</th></tr>
          </thead>
          <tbody id="attendanceTableBody">
            <tr class="empty-row"><td colspan="6">Loading records...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script>
    const API_BASE = window.location.origin + "/api/v1/";
    function authHeaders() {
      return { "Content-Type": "application/json", "Authorization": "Bearer " + localStorage.getItem("access") };
    }
    function logout() {
      localStorage.clear();
      window.location.href = "/login-page/";
    }
    function showMsg(text, isError = false) {
      const el = document.getElementById("attendanceMsg");
      el.innerText = text;
      el.className = "message show" + (isError ? " error" : "");
    }

    async function checkIn() {
      const employee = document.getElementById("employeeId").value;
      if (!employee) { showMsg("Please enter Employee ID", true); return; }
      try {
        const res = await fetch(API_BASE + "attendance/check-in/", { method: "POST", headers: authHeaders(), body: JSON.stringify({ employee }) });
        const data = await res.json();
        showMsg(res.ok ? "Check-in successful" : (data.error || "Check-in failed"), !res.ok);
        if (res.ok) loadAttendanceHistory();
      } catch { showMsg("Server connection failed", true); }
    }

    async function checkOut() {
      const employee = document.getElementById("employeeId").value;
      if (!employee) { showMsg("Please enter Employee ID", true); return; }
      try {
        const res = await fetch(API_BASE + "attendance/check-out/", { method: "POST", headers: authHeaders(), body: JSON.stringify({ employee }) });
        const data = await res.json();
        showMsg(res.ok ? "Check-out successful" : (data.error || "Check-out failed"), !res.ok);
        if (res.ok) loadAttendanceHistory();
      } catch { showMsg("Server connection failed", true); }
    }

    async function loadAttendanceHistory() {
      const tbody = document.getElementById("attendanceTableBody");
      tbody.innerHTML = "<tr class='empty-row'><td colspan='6'>Loading...</td></tr>";
      try {
        const res = await fetch(API_BASE + "attendance/history/", { headers: authHeaders() });
        const data = await res.json();
        if (!res.ok || !Array.isArray(data)) { tbody.innerHTML = "<tr class='empty-row'><td colspan='6'>Failed to load</td></tr>"; return; }
        if (data.length === 0) { tbody.innerHTML = "<tr class='empty-row'><td colspan='6'>No attendance records found</td></tr>"; return; }
        tbody.innerHTML = "";
        data.forEach(item => {
          const tr = document.createElement("tr");
          const ci = item.check_in ? new Date(item.check_in).toLocaleTimeString() : "-";
          const co = item.check_out ? new Date(item.check_out).toLocaleTimeString() : "-";
          const statusColor = item.status === 'Present' ? '#2e7d32' : '#888';
          tr.innerHTML = `<td>${item.id??""}</td><td>${item.employee??""}</td><td>${item.date??""}</td><td>${ci}</td><td>${co}</td><td style="color:${statusColor};font-weight:600;">${item.status??""}</td>`;
          tbody.appendChild(tr);
        });
      } catch { tbody.innerHTML = "<tr class='empty-row'><td colspan='6'>Server connection failed</td></tr>"; }
    }

    loadAttendanceHistory();
  </script>
</body>
</html>
