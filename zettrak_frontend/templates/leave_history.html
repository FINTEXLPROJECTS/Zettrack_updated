<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZetTrak - Leave History</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">ZetTrak</div>
      <div class="brand-sub">HRMS System</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard/">
        <span class="nav-icon">&#127968;</span> Dashboard
      </a>
      <a href="/employees-page/">
        <span class="nav-icon">&#128101;</span> Employees
      </a>
      <a href="/attendance-page/">
        <span class="nav-icon">&#128203;</span> Attendance
      </a>
      <a href="/leaves-page/">
        <span class="nav-icon">&#127807;</span> Leaves
      </a>
      <a href="/leave-history-page/" class="active">
        <span class="nav-icon">&#128202;</span> Leave History
      </a>
      <a href="/admin/">
        <span class="nav-icon">&#9881;</span> Admin
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">
        <span>&#128682;</span> Logout
      </button>
    </div>
  </aside>

  <!-- MAIN WRAPPER -->
  <div class="main-wrapper">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <h2>Leave History</h2>
        <p>View all leave application records</p>
      </div>
      <span class="topbar-badge">ZetTrak</span>
    </header>

    <!-- CONTENT -->
    <main class="content">

      <div class="form-panel">
        <div class="section-title">
          <span>&#128202;</span> Leave Records
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="loadLeaveHistory()">&#8635; Load Leave History</button>
        </div>
        <p id="leaveHistoryMsg" class="message"></p>
      </div>

      <div class="table-panel">
        <div class="table-header">
          <h4>&#128202; All Leave Applications</h4>
        </div>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Employee</th>
              <th>Leave Type</th>
              <th>Start Date</th>
              <th>End Date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="leaveHistoryTableBody">
            <tr class="empty-row"><td colspan="6">Click "Load Leave History" to view records</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script>
    const API_BASE = window.location.origin + "/api/v1/";

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("access")
      };
    }

    function logout() {
      localStorage.removeItem("access");
      localStorage.removeItem("refresh");
      window.location.href = "/";
    }

    function showMsg(text, isError = false) {
      const el = document.getElementById("leaveHistoryMsg");
      el.innerText = text;
      el.className = "message show" + (isError ? " error" : "");
    }

    async function loadLeaveHistory() {
      const tbody = document.getElementById("leaveHistoryTableBody");
      tbody.innerHTML = "<tr class='empty-row'><td colspan='6'>Loading...</td></tr>";

      try {
        const response = await fetch(API_BASE + "leaves/history/", {
          method: "GET",
          headers: authHeaders()
        });

        const data = await response.json();

        if (!response.ok) {
          showMsg("Failed to load leave history", true);
          tbody.innerHTML = "<tr class='empty-row'><td colspan='6'>Failed to load records</td></tr>";
          return;
        }

        if (data.length === 0) {
          tbody.innerHTML = "<tr class='empty-row'><td colspan='6'>No leave records found</td></tr>";
          return;
        }

        tbody.innerHTML = "";
        data.forEach(item => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${item.id ?? ""}</td>
            <td>${item.employee ?? ""}</td>
            <td>${item.leave_type ?? ""}</td>
            <td>${item.start_date ?? ""}</td>
            <td>${item.end_date ?? ""}</td>
            <td>${item.status ?? ""}</td>
          `;
          tbody.appendChild(row);
        });
      } catch (error) {
        showMsg("Server connection failed", true);
        tbody.innerHTML = "<tr class='empty-row'><td colspan='6'>Server connection failed</td></tr>";
      }
    }
  </script>
</body>
</html>
