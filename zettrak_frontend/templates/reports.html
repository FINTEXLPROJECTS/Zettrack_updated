{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZetTrak - Reports</title>
  <link rel="stylesheet" href="{% static 'app.css' %}" />
  <style>
    .report-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:20px; margin-bottom:28px; }
    .report-card { background:#fff; border-radius:14px; padding:24px; box-shadow:0 2px 14px rgba(0,0,0,0.07); border-top:4px solid #86BC25; }
    .report-card.dark { border-top-color:#000; background:#f8f8f8; }
    .report-card-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#000; margin-bottom:14px; }
    .report-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid #f0f0f0; font-size:13px; }
    .report-row:last-child { border-bottom:none; }
    .report-row span:first-child { color:#555; }
    .report-val { font-weight:700; color:#86BC25; font-size:16px; }
    .report-val.dark-val { color:#000; }
  </style>
</head>
<body>

  {% with active_page='reports' %}{% include '_sidebar.html' %}{% endwith %}

  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <h2>&#128202; Reports</h2>
        <p>System-wide summary and analytics</p>
      </div>
      <span class="topbar-badge">&#9881; Admin</span>
    </header>

    <main class="content">

      <div class="form-panel">
        <div class="btn-row">
          <button class="btn btn-primary" onclick="loadReports()">&#8635; Refresh Reports</button>
        </div>
        <p id="reportMsg" class="message"></p>
      </div>

      <div class="report-grid" id="reportGrid">
        <div style="text-align:center;padding:40px;color:#aaa;grid-column:1/-1;">Loading reports...</div>
      </div>

    </main>
  </div>

  <script>
    if (!localStorage.getItem("access") || localStorage.getItem("userType") !== "admin") {
      window.location.href = "/login-page/";
    }
    const API = window.location.origin + "/api/v1/";
    function authHeaders() {
      return { "Content-Type": "application/json", "Authorization": "Bearer " + localStorage.getItem("access") };
    }
    function logout() { localStorage.clear(); window.location.href = "/login-page/"; }

    async function loadReports() {
      const grid = document.getElementById("reportGrid");
      grid.innerHTML = "<div style='text-align:center;padding:40px;color:#aaa;grid-column:1/-1;'>Loading...</div>";
      try {
        const res = await fetch(API + "reports/summary/", { headers: authHeaders() });
        const d = await res.json();
        if (!res.ok) { grid.innerHTML = "<div style='text-align:center;padding:40px;color:#aaa;grid-column:1/-1;'>Failed to load reports</div>"; return; }

        grid.innerHTML = `
          <div class="report-card">
            <div class="report-card-title">&#128101; Employees</div>
            <div class="report-row"><span>Total Employees</span><span class="report-val">${d.employees?.total??0}</span></div>
            <div class="report-row"><span>Active</span><span class="report-val">${d.employees?.active??0}</span></div>
            <div class="report-row"><span>Inactive</span><span class="report-val dark-val">${d.employees?.inactive??0}</span></div>
          </div>

          <div class="report-card dark">
            <div class="report-card-title">&#128203; Attendance</div>
            <div class="report-row"><span>Total Records</span><span class="report-val dark-val">${d.attendance?.total_records??0}</span></div>
          </div>

          <div class="report-card">
            <div class="report-card-title">&#127807; Leave Requests</div>
            <div class="report-row"><span>Total</span><span class="report-val">${d.leaves?.total??0}</span></div>
            <div class="report-row"><span>Approved</span><span class="report-val">${d.leaves?.approved??0}</span></div>
            <div class="report-row"><span>Pending</span><span class="report-val dark-val">${d.leaves?.pending??0}</span></div>
            <div class="report-row"><span>Rejected</span><span class="report-val dark-val">${d.leaves?.rejected??0}</span></div>
          </div>

          <div class="report-card dark">
            <div class="report-card-title">&#128181; Payroll</div>
            <div class="report-row"><span>Total Records</span><span class="report-val dark-val">${d.payroll?.total??0}</span></div>
            <div class="report-row"><span>Paid</span><span class="report-val">${d.payroll?.paid??0}</span></div>
            <div class="report-row"><span>Pending</span><span class="report-val dark-val">${d.payroll?.pending??0}</span></div>
          </div>
        `;
      } catch { grid.innerHTML = "<div style='text-align:center;padding:40px;color:#aaa;grid-column:1/-1;'>Server connection failed</div>"; }
    }

    loadReports();
  </script>
</body>
</html>
