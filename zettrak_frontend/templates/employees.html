<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employees</title>
  <link rel="stylesheet" href="../static/app.css" />
</head>
<body>
  <header class="topbar">
    <h2>Employees</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <nav class="navbar">
    <a href="dashboard.html">Dashboard</a>
    <a href="employees.html">Employees</a>
    <a href="attendance.html">Attendance</a>
    <a href="leaves.html">Leaves</a>
    <a href="leave_history.html">Leave History</a>
  </nav>

  <main class="container">
    <h3>Add Employee</h3>

    <div class="form-grid">
      <input type="number" id="company" placeholder="Company ID" />
      <input type="number" id="user" placeholder="User ID" />
      <input type="text" id="employee_code" placeholder="Employee Code" />
      <input type="text" id="first_name" placeholder="First Name" />
      <input type="text" id="last_name" placeholder="Last Name" />
      <input type="email" id="email" placeholder="Email" />
      <input type="text" id="phone" placeholder="Phone" />
      <input type="date" id="date_of_joining" />
    </div>

    <button onclick="addEmployee()">Add Employee</button>
    <button class="secondary-btn" onclick="loadEmployees()">Load Employees</button>
    <p id="employeeMsg" class="message"></p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Code</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
          </tr>
        </thead>
        <tbody id="employeeTableBody"></tbody>
      </table>
    </div>
  </main>

  <script>
    const API_BASE = window.location.origin + "/api/v1/";

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + localStorage.getItem("access")
      };
    }

    function logout() {
      localStorage.removeItem("access");
      localStorage.removeItem("refresh");
      window.location.href = "login.html";
    }

    async function addEmployee() {
      const payload = {
        company: document.getElementById("company").value,
        user: document.getElementById("user").value,
        employee_code: document.getElementById("employee_code").value,
        first_name: document.getElementById("first_name").value,
        last_name: document.getElementById("last_name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        date_of_joining: document.getElementById("date_of_joining").value,
        is_active: true
      };

      const msg = document.getElementById("employeeMsg");

      try {
        const response = await fetch(API_BASE + "employees/", {
          method: "POST",
          headers: authHeaders(),
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          msg.innerText = "Failed to add employee";
          return;
        }

        msg.innerText = "Employee added successfully";
        loadEmployees();
      } catch (error) {
        msg.innerText = "Server connection failed";
      }
    }

    async function loadEmployees() {
      const tbody = document.getElementById("employeeTableBody");
      tbody.innerHTML = "";

      try {
        const response = await fetch(API_BASE + "employees/", {
          method: "GET",
          headers: authHeaders()
        });

        const data = await response.json();

        if (!response.ok) return;

        data.forEach(emp => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${emp.id ?? ""}</td>
            <td>${emp.employee_code ?? ""}</td>
            <td>${emp.first_name ?? ""}</td>
            <td>${emp.email ?? ""}</td>
            <td>${emp.phone ?? ""}</td>
          `;
          tbody.appendChild(row);
        });
      } catch (error) {
        console.log(error);
      }
    }
  </script>
</body>
</html>
