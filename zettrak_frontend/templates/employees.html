{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZetTrak - Employees</title>
  <link rel="stylesheet" href="{% static 'app.css' %}" />
</head>
<body>

  {% with active_page='employees' %}{% include '_sidebar.html' %}{% endwith %}

  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <h2>&#128101; Employees</h2>
        <p>Add and manage employee records</p>
      </div>
      <span class="topbar-badge">&#9881; Admin</span>
    </header>

    <main class="content">

      <div class="form-panel">
        <div class="section-title"><span>&#43;</span> Add New Employee</div>
        <div class="form-grid">
          <input type="number" id="company" placeholder="Company ID" />
          <input type="number" id="user" placeholder="User ID" />
          <input type="text" id="employee_code" placeholder="Employee Code" />
          <input type="text" id="first_name" placeholder="First Name" />
          <input type="text" id="last_name" placeholder="Last Name" />
          <input type="email" id="email" placeholder="Email Address" />
          <input type="text" id="phone" placeholder="Phone Number" />
          <input type="date" id="date_of_joining" />
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="addEmployee()">&#43; Add Employee</button>
          <button class="btn btn-secondary" onclick="loadEmployees()">&#8635; Load All</button>
        </div>
        <p id="employeeMsg" class="message"></p>
      </div>

      <div class="table-panel">
        <div class="table-header"><h4>&#128101; Employee List</h4></div>
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Code</th><th>Name</th><th>Email</th><th>Phone</th><th>Joining Date</th>
            </tr>
          </thead>
          <tbody id="employeeTableBody">
            <tr class="empty-row"><td colspan="6">Click "Load All" to view records</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script>
    const API_BASE = window.location.origin + "/api/v1/";
    function authHeaders() {
      return { "Content-Type": "application/json", "Authorization": "Bearer " + localStorage.getItem("access") };
    }
    function logout() {
      localStorage.clear();
      window.location.href = "/login-page/";
    }
    function showMsg(id, text, isError = false) {
      const el = document.getElementById(id);
      el.innerText = text;
      el.className = "message show" + (isError ? " error" : "");
    }

    async function addEmployee() {
      const payload = {
        company: document.getElementById("company").value,
        user: document.getElementById("user").value,
        employee_code: document.getElementById("employee_code").value,
        first_name: document.getElementById("first_name").value,
        last_name: document.getElementById("last_name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        date_of_joining: document.getElementById("date_of_joining").value,
        is_active: true
      };
      try {
        const res = await fetch(API_BASE + "employees/", { method: "POST", headers: authHeaders(), body: JSON.stringify(payload) });
        const data = await res.json();
        if (!res.ok) { showMsg("employeeMsg", JSON.stringify(data), true); return; }
        showMsg("employeeMsg", "Employee added successfully");
        loadEmployees();
      } catch { showMsg("employeeMsg", "Server connection failed", true); }
    }

    async function loadEmployees() {
      const tbody = document.getElementById("employeeTableBody");
      tbody.innerHTML = "<tr class='empty-row'><td colspan='6'>Loading...</td></tr>";
      try {
        const res = await fetch(API_BASE + "employees/", { headers: authHeaders() });
        const data = await res.json();
        if (!res.ok || !Array.isArray(data)) { tbody.innerHTML = "<tr class='empty-row'><td colspan='6'>Failed to load</td></tr>"; return; }
        if (data.length === 0) { tbody.innerHTML = "<tr class='empty-row'><td colspan='6'>No employees found</td></tr>"; return; }
        tbody.innerHTML = "";
        data.forEach(emp => {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${emp.id??""}</td><td>${emp.employee_code??""}</td><td>${emp.first_name??""} ${emp.last_name??""}</td><td>${emp.email??""}</td><td>${emp.phone??""}</td><td>${emp.date_of_joining??""}</td>`;
          tbody.appendChild(tr);
        });
      } catch { tbody.innerHTML = "<tr class='empty-row'><td colspan='6'>Server connection failed</td></tr>"; }
    }

    loadEmployees();
  </script>
</body>
</html>
