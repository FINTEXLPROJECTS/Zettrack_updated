{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZetTrak - Departments</title>
  <link rel="stylesheet" href="{% static 'app.css' %}" />
  <style>
    .del-btn { padding:4px 10px; background:#000000; color:#ffffff; border:none; border-radius:6px; font-size:11px; font-weight:700; cursor:pointer; }
    .del-btn:hover { background:#333333; }
  </style>
</head>
<body>

  {% with active_page='departments' %}{% include '_sidebar.html' %}{% endwith %}

  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <h2>&#127963; Departments</h2>
        <p>Manage company departments</p>
      </div>
      <span class="topbar-badge">&#9881; Admin</span>
    </header>

    <main class="content">

      <div class="form-panel">
        <div class="section-title"><span>&#43;</span> Add New Department</div>
        <div class="form-grid">
          <input type="number" id="d_company" placeholder="Company ID *" />
          <input type="text"   id="d_name"    placeholder="Department Name *" />
          <textarea           id="d_desc"    placeholder="Description (optional)"></textarea>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="addDepartment()">&#43; Add Department</button>
          <button class="btn btn-secondary" onclick="loadDepartments()">&#8635; Refresh</button>
        </div>
        <p id="deptMsg" class="message"></p>
      </div>

      <div class="table-panel">
        <div class="table-header"><h4>&#127963; All Departments</h4></div>
        <table>
          <thead>
            <tr><th>ID</th><th>Name</th><th>Company ID</th><th>Description</th><th>Action</th></tr>
          </thead>
          <tbody id="deptTableBody">
            <tr class="empty-row"><td colspan="5">Loading...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script>
    if (!localStorage.getItem("access") || localStorage.getItem("userType") !== "admin") {
      window.location.href = "/login-page/";
    }
    const API = window.location.origin + "/api/v1/";
    function authHeaders() {
      return { "Content-Type": "application/json", "Authorization": "Bearer " + localStorage.getItem("access") };
    }
    function logout() { localStorage.clear(); window.location.href = "/login-page/"; }
    function showMsg(text, isError = false) {
      const el = document.getElementById("deptMsg");
      el.innerText = text;
      el.className = "message show" + (isError ? " error" : "");
    }

    async function addDepartment() {
      const payload = {
        company: document.getElementById("d_company").value,
        name: document.getElementById("d_name").value.trim(),
        description: document.getElementById("d_desc").value,
      };
      if (!payload.company || !payload.name) { showMsg("Company ID and Department name are required", true); return; }
      try {
        const res = await fetch(API + "employees/departments/", { method: "POST", headers: authHeaders(), body: JSON.stringify(payload) });
        const data = await res.json();
        if (!res.ok) { showMsg("Failed: " + JSON.stringify(data), true); return; }
        showMsg("Department added successfully");
        document.getElementById("d_company").value = "";
        document.getElementById("d_name").value = "";
        document.getElementById("d_desc").value = "";
        loadDepartments();
      } catch { showMsg("Server connection failed", true); }
    }

    async function deleteDepartment(id, name) {
      if (!confirm("Delete department '" + name + "'?")) return;
      try {
        const res = await fetch(API + "employees/departments/" + id + "/", { method: "DELETE", headers: authHeaders() });
        if (res.status === 204 || res.ok) { showMsg("Department deleted"); loadDepartments(); }
        else showMsg("Failed to delete", true);
      } catch { showMsg("Server error", true); }
    }

    async function loadDepartments() {
      const tbody = document.getElementById("deptTableBody");
      tbody.innerHTML = "<tr class='empty-row'><td colspan='5'>Loading...</td></tr>";
      try {
        const res = await fetch(API + "employees/departments/", { headers: authHeaders() });
        const data = await res.json();
        if (!res.ok || !Array.isArray(data)) { tbody.innerHTML = "<tr class='empty-row'><td colspan='5'>Failed to load</td></tr>"; return; }
        if (data.length === 0) { tbody.innerHTML = "<tr class='empty-row'><td colspan='5'>No departments found. Add one above.</td></tr>"; return; }
        tbody.innerHTML = "";
        data.forEach(d => {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${d.id??""}</td><td><strong>${d.name??""}</strong></td><td>${d.company??""}</td><td>${d.description??"-"}</td><td><button class="del-btn" onclick="deleteDepartment(${d.id},'${(d.name||"").replace(/'/g,"\\'")}')">&#128465; Delete</button></td>`;
          tbody.appendChild(tr);
        });
      } catch { tbody.innerHTML = "<tr class='empty-row'><td colspan='5'>Server connection failed</td></tr>"; }
    }

    loadDepartments();
  </script>
</body>
</html>
