{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZetTrak - Users</title>
  <link rel="stylesheet" href="{% static 'app.css' %}" />
  <style>
    .badge-staff    { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; background:#e8f5e9; color:#2e7d32; }
    .badge-regular  { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; background:#f3f4f6; color:#555; }
    .badge-active   { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; background:#e3f2fd; color:#1565c0; }
    .badge-inactive { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; background:#fce4ec; color:#c62828; }
    .del-btn { padding:4px 10px; background:#e53935; color:#fff; border:none; border-radius:6px; font-size:11px; font-weight:700; cursor:pointer; }
    .del-btn:hover { opacity:0.85; }
  </style>
</head>
<body>

  {% with active_page='users' %}{% include '_sidebar.html' %}{% endwith %}

  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <h2>&#128100; Users</h2>
        <p>Manage system user accounts</p>
      </div>
      <span class="topbar-badge">&#9881; Admin</span>
    </header>

    <main class="content">

      <!-- Add User Form -->
      <div class="form-panel">
        <div class="section-title"><span>&#43;</span> Add New User</div>
        <div class="form-grid">
          <input type="text"     id="u_username"   placeholder="Username *" />
          <input type="email"    id="u_email"      placeholder="Email" />
          <input type="text"     id="u_first_name" placeholder="First Name" />
          <input type="text"     id="u_last_name"  placeholder="Last Name" />
          <input type="text"     id="u_phone"      placeholder="Phone" />
          <input type="password" id="u_password"   placeholder="Password *" />
          <select id="u_is_staff">
            <option value="false">Regular User</option>
            <option value="true">Admin / Staff</option>
          </select>
          <select id="u_is_active">
            <option value="true">Active</option>
            <option value="false">Inactive</option>
          </select>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="addUser()">&#43; Add User</button>
          <button class="btn btn-secondary" onclick="loadUsers()">&#8635; Refresh</button>
        </div>
        <p id="userMsg" class="message"></p>
      </div>

      <!-- Users Table -->
      <div class="table-panel">
        <div class="table-header"><h4>&#128100; All Users</h4></div>
        <table>
          <thead>
            <tr><th>ID</th><th>Username</th><th>Email</th><th>Name</th><th>Phone</th><th>Role</th><th>Status</th><th>Action</th></tr>
          </thead>
          <tbody id="userTableBody">
            <tr class="empty-row"><td colspan="8">Loading...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script>
    if (!localStorage.getItem("access") || localStorage.getItem("userType") !== "admin") {
      window.location.href = "/login-page/";
    }
    const API_BASE = window.location.origin + "/api/v1/";
    function authHeaders() {
      return { "Content-Type": "application/json", "Authorization": "Bearer " + localStorage.getItem("access") };
    }
    function logout() { localStorage.clear(); window.location.href = "/login-page/"; }
    function showMsg(text, isError = false) {
      const el = document.getElementById("userMsg");
      el.innerText = text;
      el.className = "message show" + (isError ? " error" : "");
    }

    async function addUser() {
      const payload = {
        username: document.getElementById("u_username").value,
        email: document.getElementById("u_email").value,
        first_name: document.getElementById("u_first_name").value,
        last_name: document.getElementById("u_last_name").value,
        phone: document.getElementById("u_phone").value,
        password: document.getElementById("u_password").value,
        is_staff: document.getElementById("u_is_staff").value === "true",
        is_active: document.getElementById("u_is_active").value === "true",
      };
      if (!payload.username || !payload.password) { showMsg("Username and password are required", true); return; }
      try {
        const res = await fetch(API_BASE + "accounts/users/", { method: "POST", headers: authHeaders(), body: JSON.stringify(payload) });
        const data = await res.json();
        if (!res.ok) { showMsg("Failed: " + JSON.stringify(data), true); return; }
        showMsg("User created successfully");
        document.getElementById("u_username").value = "";
        document.getElementById("u_password").value = "";
        loadUsers();
      } catch { showMsg("Server connection failed", true); }
    }

    async function deleteUser(id) {
      if (!confirm("Delete user #" + id + "? This cannot be undone.")) return;
      try {
        const res = await fetch(`${API_BASE}accounts/users/${id}/`, { method: "DELETE", headers: authHeaders() });
        if (res.status === 204 || res.ok) { showMsg("User deleted"); loadUsers(); }
        else showMsg("Failed to delete", true);
      } catch { showMsg("Server error", true); }
    }

    async function loadUsers() {
      const tbody = document.getElementById("userTableBody");
      tbody.innerHTML = "<tr class='empty-row'><td colspan='8'>Loading...</td></tr>";
      try {
        const res = await fetch(API_BASE + "accounts/users/", { headers: authHeaders() });
        const data = await res.json();
        if (!res.ok || !Array.isArray(data)) { tbody.innerHTML = "<tr class='empty-row'><td colspan='8'>Failed to load</td></tr>"; return; }
        if (data.length === 0) { tbody.innerHTML = "<tr class='empty-row'><td colspan='8'>No users found</td></tr>"; return; }
        tbody.innerHTML = "";
        data.forEach(u => {
          const tr = document.createElement("tr");
          const roleBadge = u.is_staff ? '<span class="badge-staff">Admin</span>' : '<span class="badge-regular">User</span>';
          const activeBadge = u.is_active ? '<span class="badge-active">Active</span>' : '<span class="badge-inactive">Inactive</span>';
          tr.innerHTML = `<td>${u.id??""}</td><td><strong>${u.username??""}</strong></td><td>${u.email??""}</td><td>${u.first_name??""} ${u.last_name??""}</td><td>${u.phone??""}</td><td>${roleBadge}</td><td>${activeBadge}</td><td><button class="del-btn" onclick="deleteUser(${u.id})">&#128465; Delete</button></td>`;
          tbody.appendChild(tr);
        });
      } catch { tbody.innerHTML = "<tr class='empty-row'><td colspan='8'>Server connection failed</td></tr>"; }
    }

    loadUsers();
  </script>
</body>
</html>
